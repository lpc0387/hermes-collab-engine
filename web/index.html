<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>协同引擎 · 像素工位 v4.5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Hermes Pixel Office — soft-pixel theme
   Palette: warm dusk · 4px grid · pixel borders · CRT bloom
   ============================================================ */
:root{
  /* warm pixel palette */
  --bg-0:#1a1320;        /* deepest */
  --bg-1:#241a2c;        /* panel base */
  --bg-2:#2e2238;        /* panel raised */
  --bg-3:#3a2c46;        /* panel hover */
  --line:#5a3f6e;        /* pixel border base */
  --line-bright:#8a5fa8; /* highlighted border */
  --ink:#fbe7c6;         /* primary text — warm cream */
  --ink-2:#d4b896;       /* secondary text */
  --ink-3:#9a7e6e;       /* muted */
  --gold:#ffc857;        /* accents */
  --rose:#ff6188;        /* failed/danger */
  --leaf:#a3d977;        /* done/success */
  --sky:#7dc4e4;         /* running/info */
  --plum:#c792ea;        /* skill/special */
  --amber:#ff9e64;       /* warning */
  --crt-glow:rgba(255,200,120,.04);
  --shadow-pix:0 4px 0 #0c0710, 0 8px 24px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:
    radial-gradient(circle at 20% 0%, #3a1f3e 0%, transparent 50%),
    radial-gradient(circle at 90% 100%, #1f2740 0%, transparent 55%),
    var(--bg-0);
  color:var(--ink);
  font-family:'VT323',ui-monospace,'JetBrains Mono',monospace;
  font-size:18px;
  line-height:1.35;
  letter-spacing:.3px;
  image-rendering:pixelated;
  -webkit-font-smoothing:none;
  font-smooth:never;
  overflow-x:hidden;
}
/* global subtle scanline overlay */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:100;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.18) 0,rgba(0,0,0,.18) 1px,transparent 1px,transparent 3px);
  mix-blend-mode:multiply;opacity:.55;
}
/* vignette */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:99;
  background:radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,.55) 100%);
}
button,input,select,textarea{font:inherit;color:inherit}

/* --- Pixel border helper: 9-slice via box-shadow --- */
.pix{
  background:var(--bg-1);
  border:2px solid var(--line);
  box-shadow:
    inset 0 0 0 2px var(--bg-1),
    inset 0 0 0 4px var(--line),
    0 0 0 2px var(--bg-0),
    var(--shadow-pix);
  position:relative;
}
.pix::before,.pix::after{
  content:'';position:absolute;width:6px;height:6px;background:var(--gold);
  image-rendering:pixelated;pointer-events:none;
}
.pix::before{top:-4px;left:-4px;box-shadow:calc(100% + 0px) 0 0 var(--gold)}
.pix::after{bottom:-4px;left:-4px;box-shadow:calc(100% + 0px) 0 0 var(--gold)}

/* --- Header --- */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 28px 10px;gap:18px;flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:14px}
.brand-logo{
  width:48px;height:48px;flex-shrink:0;
  background:
    linear-gradient(180deg,var(--gold) 0%,var(--gold) 25%,var(--amber) 25%,var(--amber) 50%,var(--rose) 50%,var(--rose) 75%,var(--plum) 75%);
  border:2px solid var(--bg-0);
  box-shadow:0 0 0 2px var(--gold),inset 0 0 0 2px rgba(0,0,0,.3);
  position:relative;
  animation:logoBob 3s ease-in-out infinite;
}
.brand-logo::after{
  content:'';position:absolute;inset:8px;
  background:var(--bg-0);
  clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);
}
@keyframes logoBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.brand h1{
  font-family:'Press Start 2P','VT323','PingFang SC','Microsoft YaHei',sans-serif;
  font-size:18px;letter-spacing:2px;color:var(--gold);
  text-shadow:2px 2px 0 var(--bg-0),0 0 12px rgba(255,200,87,.4);
}
.brand .tagline{
  font-size:14px;color:var(--ink-3);margin-top:4px;
  font-family:'VT323','PingFang SC','Microsoft YaHei',monospace;
}
.status-cluster{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.live-pill{
  background:var(--bg-1);
  border:2px solid var(--line);
  padding:6px 12px;
  font-size:14px;color:var(--ink-2);
  display:flex;align-items:center;gap:8px;
  font-family:'VT323',monospace;
  box-shadow:2px 2px 0 var(--bg-0);
}
.live-dot{
  width:8px;height:8px;background:var(--leaf);
  box-shadow:0 0 0 2px var(--bg-0),0 0 8px var(--leaf);
  animation:blink 1.4s steps(2,start) infinite;
}
.live-dot.warn{background:var(--amber);box-shadow:0 0 0 2px var(--bg-0),0 0 8px var(--amber)}
.live-dot.bad{background:var(--rose);box-shadow:0 0 0 2px var(--bg-0),0 0 8px var(--rose);animation-duration:.8s}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:.35}}

/* --- Main grid --- */
.shell{
  display:grid;
  grid-template-columns:minmax(640px,1fr) 380px;
  gap:18px;padding:0 24px 28px;
}

/* --- Office card (canvas) --- */
.office-card{padding:0;overflow:hidden}
.office-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;gap:12px;flex-wrap:wrap;
  background:linear-gradient(180deg,var(--bg-2) 0%,var(--bg-1) 100%);
  border-bottom:2px solid var(--line);
}
.office-head h2{
  font-family:'Press Start 2P',monospace;
  font-size:11px;color:var(--gold);letter-spacing:1px;
}
.sub{font-size:14px;color:var(--ink-3)}
.legend{display:flex;flex-wrap:wrap;gap:10px;color:var(--ink-2);font-size:13px}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-sw{width:10px;height:10px;border:2px solid var(--bg-0);box-shadow:0 0 0 1px var(--line)}

.canvas-wrap{position:relative;padding:14px;background:var(--bg-0)}
.canvas-frame{
  position:relative;
  border:3px solid var(--line);
  box-shadow:
    inset 0 0 0 1px var(--bg-0),
    inset 0 0 60px rgba(255,170,80,.08),
    0 0 30px rgba(255,170,80,.05);
  background:#1a1426;
  overflow:hidden;
  border-radius:2px;
}
#officeCanvas{
  display:block;width:100%;
  height:min(64vh,640px);min-height:480px;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  background:#1a1426;
  cursor:crosshair;
}
.crt{
  position:absolute;inset:0;pointer-events:none;
  background:
    repeating-linear-gradient(0deg,rgba(0,0,0,.22) 0,rgba(0,0,0,.22) 1px,transparent 1px,transparent 3px),
    radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,.45) 100%);
  mix-blend-mode:multiply;
  opacity:.6;
}
.crt::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 0%,rgba(255,200,120,.04) 50%,transparent 100%);
  animation:crtScan 8s linear infinite;
}
@keyframes crtScan{0%{transform:translateY(-100%)}100%{transform:translateY(100%)}}

.tooltip{
  position:absolute;display:none;max-width:280px;
  padding:8px 10px;
  background:var(--bg-1);
  border:2px solid var(--line-bright);
  box-shadow:3px 3px 0 var(--bg-0);
  font-size:14px;color:var(--ink);
  pointer-events:none;z-index:5;
  font-family:'VT323',monospace;
  line-height:1.4;
}
.tooltip strong{color:var(--gold);font-size:15px;display:block;margin-bottom:2px}
.tooltip .muted{color:var(--ink-3);font-size:13px;margin-top:3px}
.tooltip .badge-row{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}

/* --- Metrics --- */
.metrics{
  display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
  padding:14px;background:var(--bg-0);border-top:2px solid var(--line);
}
.metric{
  background:var(--bg-1);
  border:2px solid var(--line);
  padding:10px 12px;
  position:relative;
  box-shadow:2px 2px 0 var(--bg-0);
  transition:transform .1s;
}
.metric:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--bg-0)}
.metric .num{
  font-family:'Press Start 2P',monospace;
  font-size:20px;color:var(--gold);
  text-shadow:2px 2px 0 var(--bg-0);
  line-height:1.2;
}
.metric .label{font-size:13px;color:var(--ink-3);margin-top:4px;letter-spacing:.5px}
.metric .delta{
  position:absolute;top:8px;right:10px;
  font-size:12px;color:var(--leaf);
}
.metric .delta.down{color:var(--rose)}
.metric .spark{
  display:flex;align-items:flex-end;gap:2px;height:14px;margin-top:4px;
}
.metric .spark span{flex:1;background:var(--line-bright);min-height:2px;opacity:.6}

/* --- Side panels --- */
.side{display:flex;flex-direction:column;gap:14px;min-width:0}
.panel{padding:0;overflow:hidden}
.panel-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;gap:10px;
  background:linear-gradient(180deg,var(--bg-2),var(--bg-1));
  border-bottom:2px solid var(--line);
}
.panel-head h2{
  font-family:'Press Start 2P',monospace;
  font-size:10px;color:var(--gold);letter-spacing:.8px;
}
.panel-body{padding:12px}

/* --- Node list --- */
.node-list{display:grid;gap:8px;max-height:280px;overflow-y:auto;padding-right:4px}
.node-list::-webkit-scrollbar{width:8px}
.node-list::-webkit-scrollbar-track{background:var(--bg-0)}
.node-list::-webkit-scrollbar-thumb{background:var(--line);border:2px solid var(--bg-0)}
.node-row{
  border:2px solid var(--line);
  background:var(--bg-1);
  padding:9px 10px;cursor:pointer;
  position:relative;
  transition:transform .08s,border-color .12s;
}
.node-row:hover,.node-row.kfocus{
  transform:translateX(2px);
  border-color:var(--gold);
  background:var(--bg-2);
}
.node-row.kfocus::before{
  content:'▸';position:absolute;left:-14px;top:50%;transform:translateY(-50%);
  color:var(--gold);font-size:14px;animation:blink 1s steps(2,start) infinite;
}
.node-row .title{
  font-size:16px;font-weight:600;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  font-family:'VT323',monospace;color:var(--ink);
}
.node-row .meta{
  margin-top:2px;color:var(--ink-3);font-size:13px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.badge{
  display:inline-flex;align-items:center;gap:3px;
  padding:2px 6px;font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:600;
  border:1px solid currentColor;letter-spacing:.3px;
  background:rgba(0,0,0,.25);
}
.badge.ok{color:var(--leaf)}
.badge.bad{color:var(--rose)}
.badge.run{color:var(--sky)}
.badge.wait{color:var(--ink-3)}
.badge.skill{color:var(--plum)}
.badge.tool{color:var(--gold)}
.badge.warn{color:var(--amber)}

/* --- Preview controls --- */
.preview-controls{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.preview-controls input{
  min-width:0;background:var(--bg-0);
  border:2px solid var(--line);
  color:var(--ink);padding:6px 8px;
  font-size:14px;outline:none;
  font-family:'VT323',monospace;
}
.preview-controls input:focus{border-color:var(--gold);box-shadow:inset 0 0 0 1px var(--gold)}
.preview-btn{
  grid-column:1/-1;
  border:2px solid var(--gold);
  background:var(--bg-1);
  color:var(--gold);padding:8px;
  font-size:13px;font-weight:700;cursor:pointer;
  font-family:'Press Start 2P',monospace;letter-spacing:.5px;
  box-shadow:3px 3px 0 var(--bg-0);
  transition:all .08s;
}
.preview-btn:hover{
  transform:translate(-1px,-1px);
  box-shadow:4px 4px 0 var(--bg-0);
  background:var(--gold);color:var(--bg-0);
}
.preview-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--bg-0)}

/* --- Run submit --- */
.run-submit{
  flex:1 0 100%;display:flex;gap:10px;align-items:stretch;
  background:var(--bg-1);border:2px solid var(--line);
  padding:8px;box-shadow:3px 3px 0 var(--bg-0);
}
.run-submit textarea{
  flex:1;min-height:46px;max-height:120px;resize:vertical;
  background:var(--bg-0);border:2px solid var(--line);
  color:var(--ink);padding:8px 10px;outline:none;
  font-family:'VT323',monospace;font-size:18px;
}
.run-submit textarea:focus{border-color:var(--gold);box-shadow:inset 0 0 0 1px var(--gold)}
.run-btn{
  width:112px;border:2px solid var(--gold);background:var(--plum);
  color:var(--bg-0);padding:8px;font-size:12px;font-weight:700;
  cursor:pointer;font-family:'Press Start 2P',monospace;letter-spacing:.5px;
  box-shadow:3px 3px 0 var(--bg-0);transition:all .08s;
}
.run-btn:hover:not(:disabled){transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--bg-0);background:var(--gold)}
.run-btn:active:not(:disabled){transform:translate(1px,1px);box-shadow:1px 1px 0 var(--bg-0)}
.run-btn:disabled{cursor:wait;opacity:.6;background:var(--line);color:var(--ink-3)}
.run-toast{min-width:150px;align-self:center;color:var(--ink-3);font-size:14px;font-family:'JetBrains Mono',monospace}
.run-toast.ok{color:var(--leaf)}
.run-toast.bad{color:var(--rose)}

/* --- Cap list --- */
.cap-list{display:grid;gap:6px}
.cap-item{
  border-bottom:1px dashed var(--line);
  padding:7px 0;
}
.cap-item:last-child{border-bottom:0}
.cap-item .name{font-size:15px;color:var(--ink);font-weight:600;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cap-item .desc{color:var(--ink-3);font-size:13px;margin-top:2px}
.cap-item .tools{color:var(--plum);font:12px 'JetBrains Mono',monospace;margin-top:3px;word-break:break-word}
.empty-msg{
  color:var(--ink-3);font-size:14px;text-align:center;
  padding:18px;font-style:italic;
}

/* --- Runs table --- */
.runs-controls{display:flex;gap:6px;margin-bottom:8px}
.runs-controls input{
  flex:1;background:var(--bg-0);border:2px solid var(--line);
  padding:5px 8px;color:var(--ink);font-size:14px;outline:none;
  font-family:'VT323',monospace;
}
.runs-controls input:focus{border-color:var(--gold)}
.runs-table{width:100%;border-collapse:collapse;font-size:14px;font-family:'VT323',monospace}
th{
  color:var(--ink-3);font-size:11px;font-family:'Press Start 2P',monospace;
  letter-spacing:.5px;text-align:left;padding:6px 6px;
  border-bottom:2px solid var(--line);font-weight:400;
}
td{padding:6px 6px;border-bottom:1px dashed var(--line);vertical-align:top}
tr:last-child td{border-bottom:0}
tr.run-row{transition:background .1s}
tr.run-row:hover{background:var(--bg-2)}
.link{
  color:var(--sky);text-decoration:none;font-weight:600;
  border-bottom:1px dotted var(--sky);
}
.link:hover{color:var(--gold);border-bottom-color:var(--gold)}
.tag{
  display:inline-flex;align-items:center;gap:3px;
  padding:1px 6px;font-size:11px;font-family:'JetBrains Mono',monospace;
  font-weight:700;border:1px solid currentColor;
  background:rgba(0,0,0,.3);letter-spacing:.3px;
}
.tag.ok{color:var(--leaf)}
.tag.bad{color:var(--rose)}
.tag.warn{color:var(--amber)}

/* --- Detail overlay --- */
.detail-overlay{
  position:fixed;inset:0;z-index:50;
  background:rgba(15,8,20,.82);
  display:none;align-items:center;justify-content:center;padding:24px;
  backdrop-filter:blur(2px);
}
.detail-overlay.show{display:flex;animation:fadeIn .15s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.detail-panel{
  width:min(960px,96vw);max-height:88vh;overflow:auto;
  background:var(--bg-1);
  border:3px solid var(--line-bright);
  box-shadow:
    inset 0 0 0 2px var(--bg-1),
    inset 0 0 0 4px var(--line-bright),
    6px 6px 0 var(--bg-0);
  padding:22px;position:relative;
}
.detail-panel h2{
  font-family:'Press Start 2P',monospace;
  font-size:14px;color:var(--gold);letter-spacing:.6px;
  margin-right:40px;line-height:1.5;
}
.detail-panel h3{
  font-family:'Press Start 2P',monospace;
  font-size:11px;color:var(--ink);
  margin:18px 0 10px;letter-spacing:.5px;
  border-bottom:2px dashed var(--line);padding-bottom:6px;
}
.detail-panel pre{
  white-space:pre-wrap;overflow:auto;
  background:var(--bg-0);
  border:2px solid var(--line);
  padding:12px;
  font:14px/1.6 'JetBrains Mono',monospace;
  color:var(--ink-2);max-height:280px;
}
.detail-panel p{margin:6px 0;font-size:15px;color:var(--ink-2)}
.detail-panel p strong{color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:14px;margin-right:6px}
.close-btn{
  position:absolute;top:14px;right:14px;
  width:32px;height:32px;
  border:2px solid var(--line);background:var(--bg-2);
  color:var(--ink);font-size:18px;cursor:pointer;
  font-family:'Press Start 2P',monospace;
  display:flex;align-items:center;justify-content:center;
  box-shadow:2px 2px 0 var(--bg-0);
}
.close-btn:hover{border-color:var(--rose);color:var(--rose);background:var(--bg-3)}

/* log filter chips */
.log-chips{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.log-chip{
  padding:3px 8px;font-size:12px;font-family:'JetBrains Mono',monospace;
  border:1px solid var(--line);background:var(--bg-0);
  color:var(--ink-3);cursor:pointer;
}
.log-chip.active{border-color:var(--gold);color:var(--gold)}

/* --- Responsive --- */
@media(max-width:1100px){
  .shell{grid-template-columns:1fr}
  .side{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .runs-panel,.preview-panel{grid-column:1/-1}
}
@media(max-width:760px){
  header{flex-direction:column;align-items:stretch;gap:10px}
  .run-submit{flex-direction:column;width:100%}
  .run-btn{width:100%}
  .shell{padding:0 12px 18px}
  .side{display:flex}
  .metrics{grid-template-columns:repeat(2,1fr)}
  #officeCanvas{min-height:380px}
  .legend{display:none}
  .brand h1{font-size:13px}
  .submit-bar{padding:10px 12px}
  .submit-models{grid-template-columns:1fr}
  .submit-actions{flex-direction:column-reverse;align-items:stretch}
  .submit-actions .run-btn{width:100%}
}

/* ============================================================
   v2 整改：独立任务输入区 / 左栏双行 / 运行日志面板
   ============================================================ */
/* 任务输入条 — 独立整宽，header 下方 */
.submit-bar{
  margin:0 24px 14px;padding:12px 14px;
  background:var(--bg-1);border:2px solid var(--line);
  box-shadow:var(--shadow-pix);
  position:relative;
}
.submit-bar .run-submit{display:block;margin:0;padding:0}
.submit-field{position:relative;display:flex;flex-direction:column;gap:8px}
.submit-bar textarea{
  width:100%;min-height:72px;max-height:220px;resize:vertical;
  padding:10px 12px;
  background:var(--bg-0);color:var(--ink);
  border:1px solid var(--line);outline:none;
  font-family:'VT323','JetBrains Mono',monospace;font-size:18px;line-height:1.4;
  transition:border-color .15s,box-shadow .15s;
}
.submit-bar textarea:focus{
  border-color:var(--gold);
  box-shadow:inset 0 0 0 1px var(--gold),0 0 0 2px rgba(255,200,87,.18);
}
.submit-bar textarea::placeholder{color:var(--ink-3);font-style:normal}
.submit-models{
  display:grid;grid-template-columns:repeat(2,minmax(180px,1fr));gap:8px;
}
.submit-models label{
  display:flex;flex-direction:column;gap:4px;
  color:var(--ink-3);font-size:13px;font-family:'JetBrains Mono',monospace;
}
.submit-models input{
  background:var(--bg-0);border:1px solid var(--line);color:var(--ink);
  padding:6px 8px;outline:none;font-family:'VT323','JetBrains Mono',monospace;font-size:16px;
}
.submit-models input[readonly]{
  color:var(--ink-2);background:var(--bg-1);cursor:default;
}
.submit-models input[readonly]:focus{border-color:var(--line);box-shadow:none}
.submit-actions{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.submit-hint{
  color:var(--ink-3);font-size:13px;font-family:'JetBrains Mono',monospace;
  letter-spacing:.3px;
}
.submit-bar .run-btn{
  border:2px solid var(--line);background:var(--bg-2);color:var(--ink);
  padding:8px 16px;font-family:'Press Start 2P',monospace;font-size:11px;
  letter-spacing:1px;cursor:pointer;
  box-shadow:3px 3px 0 var(--bg-0);
  transition:transform .08s,box-shadow .08s,background .15s,border-color .15s;
}
.submit-bar .run-btn:hover:not(:disabled){
  background:var(--gold);color:var(--bg-0);border-color:var(--gold);
  transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--bg-0);
}
.submit-bar .run-btn:active:not(:disabled){transform:translate(2px,2px);box-shadow:1px 1px 0 var(--bg-0)}
.submit-bar .run-btn:disabled{cursor:not-allowed;opacity:.45;background:var(--bg-1);color:var(--ink-3);border-color:var(--line)}

  padding:4px 10px;background:var(--bg-0);border:1px solid var(--line);
  font-size:13px;font-family:'JetBrains Mono',monospace;color:var(--ink-2);

  min-width:auto;align-self:auto;
}
.submit-bar .run-toast:not(:empty){opacity:1}
.submit-bar .run-toast.ok{color:var(--leaf);border-color:var(--leaf)}
.submit-bar .run-toast.bad{color:var(--rose);border-color:var(--rose)}

/* 左栏堆叠：office-card 上 / logs-panel 下 */
.left-stack{display:flex;flex-direction:column;gap:14px;min-width:0}

/* 运行日志面板 */
.logs-panel .panel-body{padding:12px 14px}

}

.log-pre .lvl-warning{color:var(--amber)}
.log-pre .lvl-info{color:var(--ink-2)}
.log-pre .lvl-debug{color:var(--ink-3)}

/* ============================================================
   v3 整改：消除大块空白
   - 左右两栏顶部对齐，各自按内容自然延展
   - canvas 改成 aspect-ratio 跟随容器宽度，不再死撑 640px
   - 左栏 logs / 右栏 runs 用 flex:1 填满剩余高度，两侧底端齐平
   ============================================================ */
.shell{align-items:start}                /* 左右两栏顶部对齐 */
.left-stack{align-self:stretch;display:flex;flex-direction:column;gap:14px;min-width:0}
.side{align-self:stretch}

/* canvas 自适应 */
.canvas-wrap{padding:12px 14px}
.canvas-frame{aspect-ratio:16/9;width:100%;max-width:none}
#officeCanvas{
  width:100% !important;height:100% !important;
  min-height:0;display:block;

}

/* 左栏：office-card 自然高度，logs-panel 吃掉剩余高度 */

/* 右栏：runs-panel 吃掉剩余高度 */

.metrics{padding:10px 14px 14px !important}

<script>
'use strict';
/* =========================================================
   HERMES PIXEL OFFICE — soft-pixel canvas dashboard
   ========================================================= */
const API='';
const $=id=>document.getElementById(id);
const canvas=$('officeCanvas');
const ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;
const tip=$('officeTip');

const state={
  runId:null,run:null,nodes:[],agents:[],runs:[],logs:[],
  hover:null,time:0,lastFetch:0,
  metricHistory:{runs:[],running:[],workers:[],lessons:[]},
  particles:[],kfocusIdx:-1,
  logFilter:'all',
  sseHealth:'connecting',
  config:null,
  refreshTimer:null,
  refreshInFlight:null,
  fullRefreshPending:false,
  lastRunsSig:'',
  lastRunDetailSig:''
};

/* ---------- palette + sprite tables ---------- */
const palettes=[
  // [shirt, skin, hair, dark]
  ['#ff6188','#fbe7c6','#3a2230','#241a2c'],
  ['#7dc4e4','#fbe7c6','#2c3e50','#241a2c'],
  ['#a3d977','#f6d6b4','#5a3320','#241a2c'],
  ['#c792ea','#fbe7c6','#1a1426','#241a2c'],
  ['#ffc857','#f6d6b4','#3a2230','#241a2c'],
  ['#ff9e64','#fbe7c6','#241a2c','#1a1426'],
  ['#7ee2c8','#f6d6b4','#3a2230','#241a2c'],
  ['#e078b5','#fbe7c6','#5a3320','#241a2c'],
  ['#9b8cff','#fbe7c6','#241a2c','#1a1426'],
  ['#ffd86b','#f6d6b4','#5a3320','#241a2c'],
];
const accessories=['headset','glasses','cap','none','headset','glasses','laptop'];

/* desk grid: 3 rows × 4 cols on the left half, soft warm office */
const desks=[];
for(let r=0;r<3;r++)for(let c=0;c<4;c++)desks.push([180+c*120,260+r*110]);
const meetingSeats=[[760,290],[840,290],[920,290],[760,360],[840,360],[920,360]];
const loungeSeats=[[800,510],[880,520],[960,510],[1020,470]];

function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function hashId(s){let h=2166136261;for(const ch of String(s||'')){h^=ch.charCodeAt(0);h=Math.imul(h,16777619)}return h>>>0}
function statusKind(s){if(['completed','skipped'].includes(s))return'done';if(['failed','timeout'].includes(s))return'failed';if(s==='running')return'running';return'planning'}
function statusTag(s){
  const m={completed:['ok','✓ done'],skipped:['ok','↷ skipped'],failed:['bad','✗ failed'],timeout:['bad','⏱ timeout'],running:['warn','▶ running'],planning:['warn','◎ planning'],created:['warn','○ created'],pending:['warn','○ pending']};
  const d=m[s]||['warn',s||'?'];
  return `<span class="tag ${d[0]}">${esc(d[1])}</span>`;
}
function badgeClass(s){const k=statusKind(s);return k==='done'?'ok':k==='failed'?'bad':k==='running'?'run':'wait'}
function parseListField(v){
  if(Array.isArray(v))return v.filter(Boolean);
  if(v==null||v==='')return [];
  if(typeof v==='string'){
    try{const parsed=JSON.parse(v);if(Array.isArray(parsed))return parsed.filter(Boolean)}catch(_e){}
    return v.split(',').map(x=>x.trim()).filter(Boolean);
  }
  return [];
}
function normalizeNode(n){
  if(!n||typeof n!=='object')return n;
  const skills=parseListField(n.skills).concat(parseListField(n.skills_json));
  const tools=parseListField(n.tools).concat(parseListField(n.tools_json));
  return {...n,skills:[...new Set(skills)],tools:[...new Set(tools)]};
}
async function getJSON(u){const r=await fetch(API+u);if(!r.ok)throw new Error(`${r.status} ${u}`);return await r.json()}
async function loadConfig(){
  try{
    const cfg=await getJSON('/api/config');state.config=cfg;
    const leader=$('leaderModel'),worker=$('workerModel');

async function postJSON(u,payload){
  const r=await fetch(API+u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  const data=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(data.error||`${r.status} ${u}`);
  return data;
}

/* ---------- agent (worker) sprite ---------- */
function drawAgent(a){
  const n=a.node,kind=statusKind(n.status);
  const t=state.time;
  const breathe=Math.sin(t/700+a.phase)*1.5;
  const blink=((t/180+a.phase*7)|0)%24===0?1:0;
  const typeBob=kind==='running'?Math.sin(t/100+a.phase)*1.5:0;

  // walking when running
  let x=a.x,y=a.y;
  if(kind==='running'){
    const orbitR=20;
    x=a.x+Math.cos(t/600+a.phase)*orbitR;
    y=a.y+Math.sin(t/600+a.phase)*orbitR*.5;
  }
  y+=breathe;

  ctx.save();ctx.translate(x|0,y|0);

  // shadow
  ctx.fillStyle='rgba(0,0,0,.35)';
  ctx.beginPath();ctx.ellipse(0,24,16,4,0,0,Math.PI*2);ctx.fill();

  const [shirt,skin,hair,dark]=a.palette;

  // legs
  const stepPhase=kind==='running'?Math.sin(t/120+a.phase):0;
  drawRect(-7,8+typeBob,5,12+stepPhase*1,dark);
  drawRect(2,8+typeBob,5,12-stepPhase*1,dark);

  // shoes
  drawRect(-8,19+typeBob+stepPhase,6,3,'#1a1426');
  drawRect(2,19+typeBob-stepPhase,6,3,'#1a1426');

  // body / shirt
  drawRect(-9,-6+typeBob,18,16,shirt);
  drawRect(-9,-6+typeBob,18,2,shadeColor(shirt,-20));
  // collar
  drawRect(-3,-6+typeBob,6,3,shadeColor(shirt,-30));

  // arms (typing animation when running)
  const armOff=kind==='running'?Math.sin(t/100+a.phase)*2:0;
  drawRect(-12,-4+typeBob,3,11,shirt);
  drawRect(9,-4+typeBob+armOff,3,11,shirt);
  drawRect(-12,5+typeBob,4,3,skin); // hand
  drawRect(8,5+typeBob+armOff,4,3,skin); // hand

  // head
  drawRect(-7,-18,14,12,skin);
  // hair
  drawRect(-8,-20,16,5,hair);
  drawRect(-8,-20,3,8,hair);
  drawRect(5,-20,3,8,hair);

  // eyes (with blink)
  if(blink){
    drawRect(-5,-12,3,1,'#241a2c');
    drawRect(2,-12,3,1,'#241a2c');
  }else{
    drawRect(-5,-13,3,3,'#241a2c');
    drawRect(2,-13,3,3,'#241a2c');
    // eye highlight
    drawRect(-4,-13,1,1,'#fff');
    drawRect(3,-13,1,1,'#fff');
  }

  // mouth (status-aware expression)
  if(kind==='done'){drawRect(-3,-8,6,1,'#a3471f');drawRect(-4,-9,1,1,'#a3471f');drawRect(3,-9,1,1,'#a3471f')}
  else if(kind==='failed'){drawRect(-3,-7,6,1,'#a3471f');drawRect(-4,-6,1,1,'#a3471f');drawRect(3,-6,1,1,'#a3471f')}
  else if(kind==='running'){drawRect(-2,-8,4,2,'#241a2c')}
  else drawRect(-2,-8,4,1,'#a3471f');

  // accessory
  if(a.accessory==='headset'){
    drawRect(-9,-19,2,8,'#241a2c');
    drawRect(7,-19,2,8,'#241a2c');
    drawRect(-9,-21,18,2,'#241a2c');
    drawRect(8,-13,4,3,'#7dc4e4'); // mic
  }
  if(a.accessory==='glasses'){
    drawRect(-6,-13,4,3,'#241a2c');
    drawRect(2,-13,4,3,'#241a2c');
    drawRect(-2,-12,4,1,'#241a2c');
  }
  if(a.accessory==='cap'){
    drawRect(-9,-22,16,3,shirt);
    drawRect(7,-21,7,2,shirt);

  if(a.accessory==='laptop'){
    drawRect(-14,8+typeBob,10,7,'#7dc4e4');

  const statusColor=kind==='done'?'#a3d977':kind==='failed'?'#ff6188':kind==='running'?'#7dc4e4':'#ffc857';

  ctx.fillStyle=`rgba(${kind==='done'?'163,217,119':kind==='failed'?'255,97,136':kind==='running'?'125,196,228':'255,200,87'},${glowAlpha})`;
  ctx.fillRect(-10,-30,20,2);

    ctx.setLineDash([2,2]);
    ctx.strokeRect(-14,-34,28,58);
    ctx.setLineDash([]);
  }

  ctx.restore();
  a.screen={x:x-14,y:y-34,w:28,h:58};
}
function shadeColor(hex,pct){
  const n=parseInt(hex.slice(1),16);
  let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=Math.max(0,Math.min(255,r+pct));g=Math.max(0,Math.min(255,g+pct));b=Math.max(0,Math.min(255,b+pct));
  return '#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
}

/* ---------- particles for state transitions ---------- */
function spawnParticles(x,y,kind){
  for(let i=0;i<8;i++){
    state.particles.push({
      x,y,vx:(Math.random()-.5)*2,vy:-Math.random()*2-.5,
      life:60,kind,
      color:kind==='done'?'#a3d977':kind==='failed'?'#ff6188':'#ffc857'
    });
  }
}
function tickParticles(){
  for(let i=state.particles.length-1;i>=0;i--){
    const p=state.particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life--;
    if(p.life<=0){state.particles.splice(i,1);continue}
    ctx.fillStyle=p.color;
    const s=p.life>30?2:1;
    ctx.fillRect(p.x|0,p.y|0,s,s);
  }
}

/* ---------- agent layout ---------- */
function zoneForNode(n,i){
  const h=hashId(n.id||n.title||i);
  const kind=statusKind(n.status);
  const cap=String(n.capability||'').toLowerCase();
  const title=String(n.title||'').toLowerCase();
  if(kind==='running')return {name:'desk',pos:desks[i%desks.length]};
  if(kind==='done'&&(cap.includes('review')||title.includes('review')||title.includes('评审')))return {name:'meeting',pos:meetingSeats[i%meetingSeats.length]};
  if(kind==='done')return {name:'lounge',pos:loungeSeats[i%loungeSeats.length]};
  if(cap.includes('plan')||title.includes('plan'))return {name:'meeting',pos:meetingSeats[i%meetingSeats.length]};
  return {name:'desk',pos:desks[i%desks.length]};
}
function makeAgents(nodes){
  const prevByid=new Map(state.agents.map(a=>[a.id,a]));
  return nodes.filter(n=>statusKind(n.status)!=='failed').map((n,i)=>{
    const id=n.id||String(i);
    const h=hashId(id);
    const zone=zoneForNode(n,i);
    const pos=zone.pos;
    const prev=prevByid.get(id);
    // detect status transition for particles
    if(prev && prev.lastStatus!==n.status){
      const kind=statusKind(n.status);
      if(kind==='done'||kind==='failed')spawnParticles(prev.x,prev.y-20,kind);
    }
    return{
      node:n,id,hash:h,
      palette:palettes[h%palettes.length],
      accessory:accessories[(h>>3)%accessories.length],
      zone:zone.name,
      x:pos[0],y:pos[1],
      phase:(h%100)/100*Math.PI*2,
      lastStatus:n.status
    };
  });
}

/* ---------- API loop ---------- */
function runsSignature(runs){
  return (runs||[]).map(r=>[r.id,r.status,r.title].join(':')).join('|');
}
function runDetailSignature(detail){
  const run=detail?.run||{};
  return JSON.stringify({
    id:run.id||detail?.id||detail?.run_id||state.runId,
    status:run.status||detail?.status,
    nodes:(detail?.nodes||[]).map(n=>[n.id,n.status,n.title,n.capability,n.deliverable,n.updated_at].join(':')),
    logs:(detail?.logs||[]).slice(-80).map(l=>[l.created_at||l.timestamp,l.level,l.node_id,l.message].join(':'))
  });
}
function clearRunView(){
  state.nodes=[];state.agents=[];state.logs=[];state.lastRunDetailSig='';
  renderNodeList();summarizePipeline();renderLogPanel();
}
async function refresh(options={}){
  if(state.refreshInFlight){
    if(options.full)state.fullRefreshPending=true;
    return state.refreshInFlight;
  }
  const full=options.full!==false;
  state.refreshInFlight=(async()=>{
    try{
      const overview=await getJSON('/api/overview');setMetrics(overview);
      if(full){
        const runs=await getJSON('/api/runs');
        const sig=runsSignature(runs||[]);
        if(sig!==state.lastRunsSig){
          state.runs=runs||[];state.lastRunsSig=sig;renderRuns();maybeAutoPopDiary();
        }
      }
      const latest=state.runs.find(r=>r.status==='running')||state.runs[0];
      if(latest)await loadRun(latest.id);
      else if(state.runId||state.nodes.length||state.logs.length)clearRunView();
      setLive('ok','在线');
    }catch(e){console.error('refresh',e);setLive('bad','离线')}
    finally{state.refreshInFlight=null}
  })();
  await state.refreshInFlight;
  if(state.fullRefreshPending){
    state.fullRefreshPending=false;
    return refresh({full:true});
  }
}
async function loadRun(runId){
  const detail=await getJSON('/api/runs/'+encodeURIComponent(runId));if(!detail)return;
  const sig=runDetailSignature(detail);
  state.runId=runId;state.run=detail;
  if(sig===state.lastRunDetailSig)return;
  state.lastRunDetailSig=sig;
  state.nodes=(detail.nodes||[]).map(normalizeNode);state.logs=detail.logs||[];
  state.agents=makeAgents(state.nodes);
  renderNodeList();summarizePipeline();renderLogPanel();
}

/* ---------- run submit ---------- */
let runBusy=false,runToastTimer=null;
function showRunToast(kind,msg){
  const el=$('runToast');clearTimeout(runToastTimer);
  el.classList.remove('ok','bad');if(kind)el.classList.add(kind);
  el.textContent=msg||'';
  if(msg)runToastTimer=setTimeout(()=>{el.classList.remove('ok','bad');el.textContent=''},3000);
}
function syncRunInput(){
  const ta=$('runRequest'),btn=$('runBtn'),cs=getComputedStyle(ta);
  ta.style.height='auto';
  const max=(parseFloat(cs.lineHeight)||24)*8+parseFloat(cs.paddingTop)+parseFloat(cs.paddingBottom);
  ta.style.height=Math.min(ta.scrollHeight,max)+'px';
  btn.disabled=runBusy||!ta.value.trim();
}
async function submitRun(e){
  e.preventDefault();
  const ta=$('runRequest'),btn=$('runBtn'),request=ta.value.trim();
  if(!request){showRunToast('bad','请输入任务描述');syncRunInput();ta.focus();return}
  runBusy=true;btn.textContent='提交中…';syncRunInput();
  try{
    const payload={request};
    const data=await postJSON('/api/runs',payload);
    ta.value='';await refresh();
    showRunToast('ok','✓ '+(data.run_id||data.id||'任务已提交'));
  }catch(err){
    showRunToast('bad','✗ 提交失败：'+(err.message||'未知错误'));
  }finally{
    runBusy=false;btn.textContent='► 提交协同任务';syncRunInput();
  }
}

function renderLogPanel(){
  const pre=$('logPre');if(!pre)return;
  const sum=$('logsSummary');
  if(!state.logs.length){
    pre.innerHTML='<span class="empty-msg">暂无日志</span>';
    if(sum)sum.textContent='暂无日志';
    return;
  }
  pre.innerHTML=formatLogs(state.logs,state.logFilter||'all');
  if(sum)sum.textContent=`共 ${state.logs.length} 条`;
  // 自动滚到底
  pre.scrollTop=pre.scrollHeight;
}
function wireLogChips(){
  document.querySelectorAll('#logChips .log-chip').forEach(c=>c.addEventListener('click',()=>{
    document.querySelectorAll('#logChips .log-chip').forEach(x=>x.classList.remove('active'));
    c.classList.add('active');
    state.logFilter=c.dataset.flt;
    renderLogPanel();
  }));
}
function formatLogs(logs,flt){
  return logs.slice(-80).filter(l=>flt==='all'||(l.level||'').toLowerCase().includes(flt)).map(l=>{
    const lv=(l.level||'info').toUpperCase();
    const cls=lv.includes('ERR')?'lvl-error':lv.includes('WARN')?'lvl-warning':lv.includes('INFO')?'lvl-info':'lvl-debug';
    const ts=l.timestamp?`<span class="ts">[${esc(String(l.timestamp).slice(11,19))}]</span> `:'';
    const node=l.node_id?`<span class="nodeid">${esc(l.node_id)}</span> `:'';
    return `${ts}<span class="${cls}">[${esc(lv)}]</span> ${node}${esc(l.message||'')}${l.data?' <span class="ts">'+esc(JSON.stringify(l.data))+'</span>':''}`;
  }).join('\n')||'<span class="empty-msg">无匹配日志</span>';
}

/* ---------- Leader 反馈日记本 ---------- */
// 在 state 上挂 diary 元数据，避免反复弹同一 run
state.diaryShown=state.diaryShown||new Set();
state.diaryCurrent=null;  // {runId,title,markdown,createdAt}

// 从一个 run 的 detail 中抽出 leader 聚合摘要（如果存在）
function extractLeaderSummary(detail){
  if(!detail||!Array.isArray(detail.logs))return null;
  // 优先找 aggregate worker 的 finished log
  const log=detail.logs.find(l=>(l.node_id==='aggregate'||String(l.node_id||'').endsWith('-aggregate'))&&l.message==='worker finished');
  let md=null,ts=null;
  if(log){
    let d=log.data;
    // 后端字段名可能是 data 或 data_json（字符串）
    if(d==null&&log.data_json!=null)d=log.data_json;
    if(typeof d==='string'){try{d=JSON.parse(d)}catch(_e){}}
    if(d&&typeof d==='object'){
      md=d.result||d.summary||d.text||null;
      if(d.ok===false&&!md)md='⚠ Leader 聚合阶段失败，无总结输出。';
    }
    ts=log.timestamp||log.created_at||null;
  }
  // 兜底：如果 nodes 里有聚合节点，读它的 result
  if(!md&&Array.isArray(detail.nodes)){
    const agg=detail.nodes.find(n=>n.id==='aggregate'||String(n.id||'').endsWith('-aggregate'));
    if(agg&&agg.result)md=agg.result;
  }
  if(!md)return null;
  return{markdown:md,createdAt:ts};
}

// 极简 markdown → HTML（仅常见结构，避免引第三方库）
function renderMarkdown(md){
  if(!md)return'<div class="empty">（无内容）</div>';
  const escapeHtml=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // 提取代码块占位
  const codeBlocks=[];
  md=md.replace(/```([a-zA-Z0-9_+-]*)\n([\s\S]*?)```/g,(_m,lang,code)=>{
    codeBlocks.push(`<pre><code class="lang-${escapeHtml(lang||'text')}">${escapeHtml(code)}</code></pre>`);
    return`\u0000CODE${codeBlocks.length-1}\u0000`;
  });
  let html=escapeHtml(md);
  // 还原代码块
  html=html.replace(/\u0000CODE(\d+)\u0000/g,(_m,i)=>codeBlocks[+i]);
  // 表格（简易支持 | 分隔，必须有分隔线行）
  html=html.replace(/(^\|.+\|\n\|[\s\-:|]+\|\n(?:\|.+\|\n?)+)/gm,block=>{
    const lines=block.trim().split('\n');
    const head=lines[0].split('|').slice(1,-1).map(s=>s.trim());
    const rows=lines.slice(2).map(r=>r.split('|').slice(1,-1).map(s=>s.trim()));
    return'<table><thead><tr>'+head.map(h=>`<th>${h}</th>`).join('')+'</tr></thead><tbody>'+
      rows.map(r=>'<tr>'+r.map(c=>`<td>${c}</td>`).join('')+'</tr>').join('')+'</tbody></table>';
  });
  // 标题
  html=html.replace(/^###\s+(.+)$/gm,'<h3>$1</h3>');
  html=html.replace(/^##\s+(.+)$/gm,'<h2>$1</h2>');
  html=html.replace(/^#\s+(.+)$/gm,'<h1>$1</h1>');
  // blockquote
  html=html.replace(/(^&gt;\s+.+(?:\n&gt;\s+.+)*)/gm,m=>'<blockquote>'+m.replace(/^&gt;\s+/gm,'')+'</blockquote>');
  // 列表
  html=html.replace(/(?:^[-*]\s+.+(?:\n[-*]\s+.+)*)/gm,m=>'<ul>'+m.split('\n').map(line=>'<li>'+line.replace(/^[-*]\s+/,'')+'</li>').join('')+'</ul>');
  html=html.replace(/(?:^\d+\.\s+.+(?:\n\d+\.\s+.+)*)/gm,m=>'<ol>'+m.split('\n').map(line=>'<li>'+line.replace(/^\d+\.\s+/,'')+'</li>').join('')+'</ol>');
  // 行内代码 + 粗体
  html=html.replace(/`([^`\n]+)`/g,'<code>$1</code>');
  html=html.replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>');
  // 链接
  html=html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  // 段落
  html=html.split(/\n{2,}/).map(p=>{
    const t=p.trim();
    if(!t)return'';
    if(/^<(h\d|ul|ol|table|pre|blockquote)/.test(t))return t;
    return'<p>'+t.replace(/\n/g,'<br>')+'</p>';
  }).join('\n');
  return html;
}

function openDiary(runId,title,summary){
  state.diaryCurrent={runId,title:title||runId,markdown:summary.markdown,createdAt:summary.createdAt};
  $('diaryTitle').textContent=title||runId;
  $('diaryRunId').textContent=runId;
  $('diaryTime').textContent=summary.createdAt?String(summary.createdAt).replace('T',' ').slice(0,19):'';
  $('diaryContent').innerHTML=renderMarkdown(summary.markdown);
  $('diaryContent').scrollTop=0;
  $('diaryOverlay').classList.add('show');
  // 焦点到内容区，方便键盘滚动
  setTimeout(()=>$('diaryContent').focus(),50);
  state.diaryShown.add(runId);
}
function closeDiary(){$('diaryOverlay').classList.remove('show');state.diaryCurrent=null}

async function showDiaryFor(runId){
  if(!runId)return;
  const detail=await getJSON('/api/runs/'+encodeURIComponent(runId)+'?full=1');
  if(!detail){showRunToast&&showRunToast('bad','✗ 找不到该任务');return}
  const summary=extractLeaderSummary(detail);
  if(!summary){
    showRunToast&&showRunToast('bad','该任务尚无 Leader 总结（可能未启用聚合或仍在进行）');
    return;
  }
  openDiary(runId,detail.title||detail.run?.title||runId,summary);
}

// 自动检测：当某个 run 由非完成态变为 completed/failed，且本会话还没弹过，自动开日记本
function maybeAutoPopDiary(){
  const runs=state.runs||[];
  // 记忆上一次每个 runId 的状态
  state._prevRunStatus=state._prevRunStatus||{};
  // 第一次拉到列表时，仅记录现有状态，不弹（避免页面刚加载就把所有历史 run 都弹一遍）
  const firstSeen=Object.keys(state._prevRunStatus).length===0;
  for(const r of runs){
    const prev=state._prevRunStatus[r.id];
    const cur=r.status;
    state._prevRunStatus[r.id]=cur;
    if(firstSeen||!prev)continue;
    if(prev===cur)continue;
    if(['completed','failed'].includes(cur)&&!state.diaryShown.has(r.id)){
      // 异步拉详情拿 leader 摘要
      showDiaryFor(r.id).catch(()=>{});
    }
  }
}

function wireDiary(){
  $('diaryCloseBtn').addEventListener('click',closeDiary);
  $('diaryOverlay').addEventListener('click',e=>{if(e.target.id==='diaryOverlay')closeDiary()});
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'&&$('diaryOverlay').classList.contains('show'))closeDiary();
  });
  $('diaryCopyBtn').addEventListener('click',async()=>{
    if(!state.diaryCurrent)return;
    try{
      await navigator.clipboard.writeText(state.diaryCurrent.markdown);
      const b=$('diaryCopyBtn'),t=b.textContent;b.textContent='✓ 已复制';setTimeout(()=>b.textContent=t,1400);
    }catch(_e){
      const b=$('diaryCopyBtn'),t=b.textContent;b.textContent='✗ 复制失败';setTimeout(()=>b.textContent=t,1400);
    }
  });
  $('diaryDownloadBtn').addEventListener('click',()=>{
    if(!state.diaryCurrent)return;
    const{runId,markdown,createdAt}=state.diaryCurrent;
    const ts=(createdAt||new Date().toISOString()).replace(/[:T]/g,'-').slice(0,19);
    const blob=new Blob(['# Leader 总结 · '+runId+'\n\n生成时间：'+(createdAt||'')+'\n\n---\n\n'+markdown],{type:'text/markdown;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`leader-summary-${runId}-${ts}.md`;
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1500);
  });
}

async function showNode(runId,nodeId){
  const detail=await getJSON('/api/runs/'+encodeURIComponent(runId)+'?full=1');
  const nodes=(detail.nodes||[]).map(normalizeNode);
  const logs=detail.logs||[];
  const node=nodes.find(n=>n.id===nodeId);if(!node)return;
  $('detailTitle').textContent=node.title||node.id;
  $('detailSub').innerHTML=`<code style="font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--ink-3)">${esc(node.id)}</code> · ${esc(node.capability||'—')} · ${statusTag(node.status)}`;
  let html='';
  if(node.deliverable)html+=`<p><strong>交付物</strong>${esc(node.deliverable)}</p>`;
  if(node.brief)html+=`<p><strong>简介</strong>${esc(node.brief)}</p>`;
  if(node.description)html+=`<p><strong>描述</strong>${esc(node.description)}</p>`;
  if(node.result)html+=`<h3>结果</h3><pre>${esc(node.result)}</pre>`;
  const nodeLogs=logs.filter(l=>l.node_id===nodeId);
  const skillLog=nodeLogs.find(l=>l.message==='worker skills selected');
  const toolLog=nodeLogs.find(l=>l.message==='worker tool profiles selected');
  if(skillLog||toolLog){
    html+='<h3>技能与工具</h3><div class="badges">';
    if(skillLog?.data?.skills)skillLog.data.skills.forEach(s=>html+=`<span class="badge skill">⌬ ${esc(s)}</span>`);
    if(toolLog?.data?.profiles)toolLog.data.profiles.forEach(p=>html+=`<span class="badge tool">⚒ ${esc(p)}</span>`);
    html+='</div>';
  }
  $('detailContent').innerHTML=html||'<div class="empty-msg">no details</div>';
  openOverlay();
}

/* ---------- canvas hover (RAF-throttled) ---------- */
let pendingMouse=null;
function canvasPoint(e){
  const r=canvas.getBoundingClientRect();
  return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height,clientX:e.clientX,clientY:e.clientY};
}
canvas.addEventListener('mousemove',e=>{pendingMouse=canvasPoint(e)});
canvas.addEventListener('mouseleave',()=>{tip.style.display='none';state.hover=null});
function processHover(){
  if(pendingMouse){
    const p=pendingMouse;pendingMouse=null;
    const hit=[...state.agents].reverse().find(a=>a.screen&&p.x>=a.screen.x&&p.x<=a.screen.x+a.screen.w&&p.y>=a.screen.y&&p.y<=a.screen.y+a.screen.h);
    if(hit){
      const n=hit.node;
      const r=canvas.getBoundingClientRect();
      tip.style.display='block';
      let lx=p.clientX-r.left+18,ly=p.clientY-r.top+18;
      if(lx>r.width-280)lx=p.clientX-r.left-280;
      if(ly>r.height-100)ly=p.clientY-r.top-100;
      tip.style.left=lx+'px';tip.style.top=ly+'px';
      tip.innerHTML=`<strong>${esc(n.title||n.id)}</strong>`+
        `<div class="muted">${esc(n.capability||'—')} · ${esc(n.status||'?')}</div>`+
        `<div class="badge-row"><span class="badge ${badgeClass(n.status)}">${esc(n.status||'?')}</span>`+
        (n.skills||[]).slice(0,2).map(s=>`<span class="badge skill">⌬ ${esc(s)}</span>`).join('')+
        (n.tools||[]).slice(0,2).map(t=>`<span class="badge tool">⚒ ${esc(t)}</span>`).join('')+`</div>`+
        `<div class="muted">zone: ${esc(hit.zone)} · click for details</div>`;
      state.hover=hit;
      canvas.style.cursor='pointer';
    }else{
      tip.style.display='none';state.hover=null;canvas.style.cursor='crosshair';
    }
  }
  requestAnimationFrame(processHover);
}
canvas.addEventListener('click',()=>{if(state.hover)showNode(state.runId,state.hover.node.id)});

/* ---------- keyboard navigation ---------- */
$('nodeList').addEventListener('keydown',e=>{
  if(!state.nodes.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();state.kfocusIdx=Math.min(state.nodes.length-1,state.kfocusIdx+1);highlightNodeRow()}
  else if(e.key==='ArrowUp'){e.preventDefault();state.kfocusIdx=Math.max(0,state.kfocusIdx-1);highlightNodeRow()}
  else if(e.key==='Enter'&&state.kfocusIdx>=0){const n=state.nodes[state.kfocusIdx];if(n)showNode(state.runId,n.id)}
});
function highlightNodeRow(){
  document.querySelectorAll('.node-row').forEach((r,i)=>r.classList.toggle('kfocus',i===state.kfocusIdx));
  const row=document.querySelector('.node-row.kfocus');
  if(row)row.scrollIntoView({block:'nearest',behavior:'smooth'});
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeOverlay();
  if(e.key==='/'&&e.target===document.body){e.preventDefault();$('runSearch').focus()}
});

/* ---------- live status ---------- */
function setLive(kind,label){
  const dot=$('liveDot');dot.classList.remove('warn','bad');
  if(kind==='warn')dot.classList.add('warn');
  if(kind==='bad')dot.classList.add('bad');
  $('connectionState').textContent=label;
  state.sseHealth=kind;
}

/* ---------- clock ---------- */
function tickClock(){
  const d=new Date();
  const pad=n=>String(n).padStart(2,'0');
  $('clockPill').textContent=`${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}
setInterval(tickClock,1000);tickClock();

/* ---------- wire up ---------- */
$('runForm').addEventListener('submit',submitRun);
$('runRequest').addEventListener('input',syncRunInput);
$('runRequest').addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='Enter')$('runForm').requestSubmit()});
syncRunInput();
$('previewBtn').addEventListener('click',previewCapabilities);
$('closeDetailBtn').addEventListener('click',closeOverlay);
$('detailOverlay').addEventListener('click',e=>{if(e.target.id==='detailOverlay')closeOverlay()});
$('runSearch').addEventListener('input',renderRuns);
wireLogChips();
wireDiary();

/* ---------- boot ---------- */
loadConfig();refresh();previewCapabilities();
requestAnimationFrame(render);
requestAnimationFrame(processHover);

/* ---------- SSE with reconnect ---------- */
function connectSSE(){
  try{
    const evt=new EventSource('/api/events');
    evt.onopen=()=>setLive('ok','在线');
    evt.onmessage=e=>{
      try{const d=JSON.parse(e.data);if(d.overview)setMetrics(d.overview);if(d.type||d.run_id)refresh({full:true})}catch(err){}
    };
    evt.onerror=()=>{
      setLive('warn','重连中…');
      evt.close();
      setTimeout(connectSSE,3000);
    };
  }catch(e){setLive('bad','SSE 不可用')}
}
connectSSE();
state.refreshTimer=setInterval(()=>refresh({full:true}),15000);
