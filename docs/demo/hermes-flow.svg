<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">Hermes Collab Engine v5.0 collaboration flow</title>
  <desc id="desc">Animated diagram showing a user request becoming a Leader WBS, parallel worker execution, dashboard and Leader diary observability, and a verified result.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef7ff"/>
    </linearGradient>
    <linearGradient id="leader" x1="0" x2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="worker" x1="0" x2="1">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .label{font:700 18px system-ui,-apple-system,Segoe UI,sans-serif;fill:#0f172a}.small{font:600 12px system-ui,-apple-system,Segoe UI,sans-serif;fill:#475569}.tiny{font:600 10px system-ui,-apple-system,Segoe UI,sans-serif;fill:#64748b}.box{fill:#fff;stroke:#dbeafe;stroke-width:1.5;filter:url(#shadow)}.line{fill:none;stroke:#64748b;stroke-width:2.5;stroke-linecap:round;marker-end:url(#arrow);opacity:.8}.pulse{fill:#f59e0b;filter:url(#shadow)}.worker-card{fill:#fff;stroke:#99f6e4;stroke-width:1.4;filter:url(#shadow)}.worker-dot{fill:#14b8a6;animation:blink 1.8s ease-in-out infinite}.worker-dot.d2{animation-delay:.25s}.worker-dot.d3{animation-delay:.5s}.phase{opacity:.72;animation:focus 7.2s ease-in-out infinite}.p2{animation-delay:1.2s}.p3{animation-delay:2.4s}.p4{animation-delay:3.6s}.p5{animation-delay:4.8s}.check{stroke:#16a34a;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;fill:none;stroke-dasharray:55;stroke-dashoffset:55;animation:draw 7.2s ease-in-out infinite}.flow1{offset-path:path('M150 180 C195 180 205 180 250 180');animation:move 7.2s linear infinite}.flow2{offset-path:path('M390 180 C430 125 455 92 510 84');animation:move 7.2s linear infinite;animation-delay:1.25s}.flow3{offset-path:path('M390 180 C430 180 455 180 510 180');animation:move 7.2s linear infinite;animation-delay:1.35s}.flow4{offset-path:path('M390 180 C430 235 455 268 510 276');animation:move 7.2s linear infinite;animation-delay:1.45s}.flow5{offset-path:path('M650 84 C692 104 705 127 735 150');animation:move 7.2s linear infinite;animation-delay:2.75s}.flow6{offset-path:path('M650 180 C690 180 704 176 735 170');animation:move 7.2s linear infinite;animation-delay:2.9s}.flow7{offset-path:path('M650 276 C692 256 705 223 735 190');animation:move 7.2s linear infinite;animation-delay:3.05s}.flow8{offset-path:path('M835 180 C868 180 878 180 905 180');animation:move 7.2s linear infinite;animation-delay:4.35s}@keyframes blink{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-2px)}}@keyframes focus{0%,100%{opacity:.72;transform:scale(1)}8%,22%{opacity:1;transform:scale(1.015)}}@keyframes draw{0%,58%{stroke-dashoffset:55}70%,92%{stroke-dashoffset:0}100%{stroke-dashoffset:55}}@keyframes move{0%{offset-distance:0%;opacity:0}10%,82%{opacity:1}24%,100%{offset-distance:100%;opacity:0}}@media (prefers-reduced-motion:reduce){.pulse,.phase,.worker-dot,.check{animation:none}.check{stroke-dashoffset:0}.pulse{display:none}}
    </style>
  </defs>

  <rect width="980" height="360" rx="28" fill="url(#bg)"/>
  <text x="40" y="42" class="label">Hermes Collab Engine v5.0</text>
  <text x="40" y="62" class="small">request orchestration → observable parallel work → verified delivery</text>

  <g class="phase p1">
    <rect class="box" x="42" y="128" width="108" height="104" rx="18"/>
    <circle cx="78" cy="164" r="18" fill="#dbeafe"/>
    <path d="M72 164 h12 M78 158 v12" stroke="#2563eb" stroke-width="3" stroke-linecap="round"/>
    <text x="96" y="160" class="small" text-anchor="middle">User</text>
    <text x="96" y="181" class="small" text-anchor="middle">request</text>
    <text x="96" y="207" class="tiny" text-anchor="middle">goal + context</text>
  </g>

  <path class="line" d="M150 180 C195 180 205 180 250 180"/>
  <circle r="6" class="pulse flow1"/>

  <g class="phase p2">
    <rect x="250" y="122" width="140" height="116" rx="20" fill="url(#leader)" filter="url(#shadow)"/>
    <text x="320" y="156" fill="#fff" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="18" font-weight="800" text-anchor="middle">Leader</text>
    <text x="320" y="178" fill="#e0f2fe" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="13" font-weight="700" text-anchor="middle">builds WBS</text>
    <rect x="276" y="196" width="88" height="7" rx="3.5" fill="#bfdbfe" opacity=".95"/>
    <rect x="276" y="210" width="66" height="7" rx="3.5" fill="#bfdbfe" opacity=".8"/>
  </g>

  <path class="line" d="M390 180 C430 125 455 92 510 84"/>
  <path class="line" d="M390 180 C430 180 455 180 510 180"/>
  <path class="line" d="M390 180 C430 235 455 268 510 276"/>
  <circle r="6" class="pulse flow2"/><circle r="6" class="pulse flow3"/><circle r="6" class="pulse flow4"/>

  <g class="phase p3">
    <g>
      <rect class="worker-card" x="510" y="52" width="140" height="64" rx="16"/>
      <text x="580" y="78" class="small" text-anchor="middle">Worker A</text>
      <text x="580" y="98" class="tiny" text-anchor="middle">implements node</text>
      <circle cx="625" cy="75" r="4" class="worker-dot"/>
    </g>
    <g>
      <rect class="worker-card" x="510" y="148" width="140" height="64" rx="16"/>
      <text x="580" y="174" class="small" text-anchor="middle">Worker B</text>
      <text x="580" y="194" class="tiny" text-anchor="middle">tests + reviews</text>
      <circle cx="625" cy="171" r="4" class="worker-dot d2"/>
    </g>
    <g>
      <rect class="worker-card" x="510" y="244" width="140" height="64" rx="16"/>
      <text x="580" y="270" class="small" text-anchor="middle">Worker C</text>
      <text x="580" y="290" class="tiny" text-anchor="middle">packages notes</text>
      <circle cx="625" cy="267" r="4" class="worker-dot d3"/>
    </g>
  </g>

  <path class="line" d="M650 84 C692 104 705 127 735 150"/>
  <path class="line" d="M650 180 C690 180 704 176 735 170"/>
  <path class="line" d="M650 276 C692 256 705 223 735 190"/>
  <circle r="6" class="pulse flow5"/><circle r="6" class="pulse flow6"/><circle r="6" class="pulse flow7"/>

  <g class="phase p4">
    <rect class="box" x="735" y="126" width="100" height="108" rx="18"/>
    <text x="785" y="154" class="small" text-anchor="middle">Dashboard</text>
    <rect x="762" y="169" width="46" height="28" rx="6" fill="#e0f2fe" stroke="#7dd3fc"/>
    <path d="M766 190 l10 -8 l8 4 l16 -14" fill="none" stroke="#0284c7" stroke-width="2" stroke-linecap="round"/>
    <text x="785" y="215" class="tiny" text-anchor="middle">Leader diary</text>
  </g>

  <path class="line" d="M835 180 C868 180 878 180 905 180"/>
  <circle r="6" class="pulse flow8"/>

  <g class="phase p5">
    <circle cx="925" cy="180" r="38" fill="#dcfce7" stroke="#86efac" stroke-width="2" filter="url(#shadow)"/>
    <path class="check" d="M906 181 l13 13 l25 -30"/>
    <text x="925" y="246" class="small" text-anchor="middle">verified result</text>
  </g>
</svg>
